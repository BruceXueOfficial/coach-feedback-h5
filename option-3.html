<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mcd-yellow: #FFBC0D;
  --mcd-yellow-light: #FFF8E1;
  --mcd-yellow-pale: #FFFBEF;
  --mcd-red: #DA291C;
  --mcd-dark: #292929;
  --mcd-gray-700: #555;
  --mcd-gray-500: #888;
  --mcd-gray-400: #AAA;
  --mcd-gray-200: #E5E5E5;
  --mcd-gray-100: #F5F5F5;
  --mcd-bg: #F2F2F2;
  --mcd-white: #FFF;
  --mcd-green: #34A853;
  --mcd-orange: #FF8C00;
  --mcd-blue: #4285F4;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-card: 0 1px 4px rgba(0,0,0,0.06);
  --font: 'PingFang SC', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { font-family: var(--font); background: var(--mcd-bg); color: var(--mcd-dark); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.status-bar { height: calc(44px + var(--safe-top)); padding-top: var(--safe-top); background: var(--mcd-yellow); position: sticky; top: 0; z-index: 100; }
.nav-bar { background: var(--mcd-yellow); padding: 0 16px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: calc(44px + var(--safe-top)); z-index: 99; }
.nav-bar__back { display: flex; align-items: center; gap: 4px; background: none; border: none; font-size: 17px; font-weight: 600; color: var(--mcd-dark); cursor: pointer; padding: 8px 4px; -webkit-tap-highlight-color: transparent; }
.nav-bar__back svg { width: 20px; height: 20px; }
.nav-bar__actions { display: flex; gap: 12px; }
.nav-bar__btn { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.08); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.nav-bar__btn:active { background: rgba(0,0,0,0.15); }
.nav-bar__btn svg { width: 18px; height: 18px; }
.content { padding: 16px; padding-bottom: calc(100px + var(--safe-bottom)); }
.card { background: var(--mcd-white); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-card); animation: fadeInUp 0.4s ease backwards; }
.card:nth-child(2) { animation-delay: 0.06s; }
.card:nth-child(3) { animation-delay: 0.12s; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.person-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.person-header__title { font-size: 18px; font-weight: 700; }
.person-header__link { display: flex; align-items: center; gap: 2px; background: var(--mcd-dark); color: var(--mcd-white); font-size: 12px; font-weight: 500; padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.person-header__link:active { opacity: 0.8; }
.person-header__link svg { width: 14px; height: 14px; }
.person-info { display: flex; align-items: center; gap: 14px; }
.person-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--mcd-yellow-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.person-avatar__emoji { font-size: 36px; line-height: 1; }
.person-name { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
.person-meta { font-size: 13px; color: var(--mcd-gray-500); display: flex; gap: 16px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }

/* SBIA Card */
.sbia-card { background: linear-gradient(135deg, #FFF9E6 0%, #FFF3CC 100%); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid rgba(255,188,13,0.2); }
.sbia-card__title { font-size: 16px; font-weight: 700; color: #292929; margin-bottom: 10px; }
.sbia-card__badge { background: #FFBC0D; color: #292929; text-align: center; padding: 6px 16px; border-radius: 6px; font-size: 13px; font-weight: 700; margin-bottom: 16px; }
.sbia-card__flow { display: flex; align-items: flex-start; justify-content: center; gap: 4px; }
.sbia-card__step { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; }
.sbia-card__icon { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
.sbia-card__icon--s { background: #9E9E9E; }
.sbia-card__icon--b { background: #616161; }
.sbia-card__icon--i { background: #DA291C; }
.sbia-card__icon--a { background: #EE3A2C; }
.sbia-card__label { font-size: 13px; font-weight: 700; color: #292929; }
.sbia-card__sub { font-size: 10px; color: #888; }
.sbia-card__arrow { color: #CCC; font-size: 16px; padding-top: 12px; flex-shrink: 0; }
</style>
</head>

<script>
const GUIDE_MAP = {
  '顾客体验': ['顾客满意度', '服务效率', '问题解决', '顾客互动'],
  '员工体验': ['工作积极性', '团队协作', '员工关怀', '训练成长'],
  '业务达成': ['营业额达成', '食品安全', '运营效率', '成本管控']
};
const BLOCK_SUFFIX = { dowell: '等方面夸夸！', dobetter: '等方面聊聊！', donext: '等方面制定计划！' };
const state = { dowell: new Set(), dobetter: new Set(), donext: new Set() };
const userContent = { dowell: '', dobetter: '', donext: '' };

// Tab switching
document.querySelectorAll('.tab-item').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.feedback-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + this.dataset.tab).classList.add('active');
  });
});

// Tag click
document.querySelectorAll('.tag').forEach(tag => {
  tag.addEventListener('click', function() {
    const blockId = this.dataset.blockId;
    const tagName = this.dataset.tag;
    if (state[blockId].has(tagName)) { state[blockId].delete(tagName); this.classList.remove('active'); }
    else { state[blockId].add(tagName); this.classList.add('active'); }
    updateTextarea(blockId);
  });
});

function updateTextarea(blockId) {
  const ta = document.querySelector('textarea[data-block-id="' + blockId + '"]');
  const guideEl = document.querySelector('.guide-text[data-guide="' + blockId + '"]');
  const tags = Array.from(state[blockId]);

  if (tags.length === 0) {
    guideEl.textContent = ''; guideEl.classList.remove('visible');
    if (userContent[blockId].trim().length === 0) {
      ta.value = ''; ta.placeholder = '请选择标签(多选)后再根据指引填写';
    }
    ta.disabled = true; return;
  }

  // Show guide text above textarea
  guideEl.textContent = buildGuide(blockId, tags);
  guideEl.classList.add('visible');
  ta.disabled = false;
  if (userContent[blockId].trim().length === 0) {
    ta.value = ''; ta.placeholder = '请在此输入反馈内容...';
    ta.style.color = '';
  }
}

function buildGuide(blockId, tags) {
  var suffix = BLOCK_SUFFIX[blockId];
  var lines = tags.map(function(t) {
    var dims = GUIDE_MAP[t] || [];
    return '• ' + t + '：从' + dims.join('、') + suffix;
  });
  return lines.join('\n');
}

// Track input & completed state
document.querySelectorAll('textarea').forEach(function(ta) {
  var blockId = ta.dataset.blockId;
  ta.addEventListener('focus', function() {});
  ta.addEventListener('blur', function() {
    userContent[blockId] = this.value;
    updateCompleted(blockId);
  });
  ta.addEventListener('input', function() {
    userContent[blockId] = this.value; this.style.color = '';
    this.style.height = 'auto'; this.style.height = Math.max(180, this.scrollHeight) + 'px';
    updateCompleted(blockId);
  });
});

function updateCompleted(blockId) {
  var tab = document.querySelector('.tab-item[data-tab="' + blockId + '"]');
  if (userContent[blockId].trim().length > 0 && state[blockId].size > 0) tab.classList.add('completed');
  else tab.classList.remove('completed');
}

document.getElementById('submitBtn').addEventListener('click', function() {
  var t = document.getElementById('toast'); t.textContent = '反馈提交成功 ✓';
  t.classList.add('show'); setTimeout(function() { t.classList.remove('show'); }, 2000);
});
</script>
</body>
